services:
  db:
    image: postgres:16-alpine
    container_name: epub-tts-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bookreader}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - epub-tts-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: epub-tts-redis
    volumes:
      - ./redis_data:/data
    restart: unless-stopped
    networks:
      - epub-tts-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./epub-tts-backend
      dockerfile: Dockerfile
    container_name: epub-tts-backend
    volumes:
      - ./epub-tts-backend/data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-bookreader}
      - REDIS_URL=redis://redis:6379/0
      - AGENT_SERVER_URL=http://agent-server:9000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - epub-tts-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  agent-server:
    build:
      context: .
      dockerfile: agent-server/Dockerfile
    container_name: agent-server
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-bookreader}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - epub-tts-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./epub-tts-frontend
      dockerfile: Dockerfile
    container_name: epub-tts-frontend
    restart: unless-stopped
    networks:
      - epub-tts-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  admin-backend:
    build:
      context: .
      dockerfile: admin-backend/Dockerfile
    container_name: admin-backend
    volumes:
      - ./admin-backend/data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-bookreader}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - epub-tts-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: admin-frontend
    depends_on:
      admin-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - epub-tts-network

  nginx:
    image: nginx:alpine
    container_name: epub-tts-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      admin-backend:
        condition: service_started
      admin-frontend:
        condition: service_started
    restart: always
    networks:
      - epub-tts-network

networks:
  epub-tts-network:
    driver: bridge
